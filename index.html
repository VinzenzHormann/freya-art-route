    justify-content: center;
    align-items: center;
    border: none;
    cursor: pointer;
    font-size: 12px;

#fact-counter {

    font-weight: 600;

    height: 230px;               /* Let content dictate height */
    /*min-height: 250px; */

    box-shadow: 0 10px 25px rgba(0,0,0,0.15); /* Slightly deeper shadow for 'floating' effect */

    padding: 25px 28px 15px 28px;; 
    display: flex;
    flex-direction: column;

/* Thin Gray Separator */
.meta-separator {
    height: 1px;
    background-color: #e5e7eb;
    margin-top: 6px;

    width: 100%;

    flex-grow: 1;

    padding-right: 4px; /* Space for the scrollbar */
}


/* Optional: Make the scrollbar look cleaner */
.fact-container::-webkit-scrollbar {
    width: 4px;

/* Horizontal Floating Container */
.route-horizontal-card {

    transform: none !important;
}

    padding-bottom: 10px;

}

#main-action-button, #route-info-box, #info-toggle-btn, #landmark-detail-card, .route-horizontal-card {
    position: fixed;
}

/* Mobile adjustment for height */
@media (max-width: 767px) {
    /* When in map-view-layout, force full screen for everything */

        display: none !important;
    }

        width: 100% !important; /* Map takes full width */
        height: 100% !important;
        display: block !important;

    .map-view-layout #site-footer { display: none; }
    
    #info-toggle-btn { bottom: calc(1.5rem + 45px); left: calc(50% + 42%); }

        padding: 6px 10px 20px 10px; 
    }
    .map-view-layout #main-content-wrapper { flex-direction: row; }
    .map-view-layout #control-panel { width: 33.33%; height: 100%; }
    .map-view-layout #map-container { width: 66.66%; height: 100% ; display: block ; }

/* Force visible scrollbar on Desktop */
@media (min-width: 1024px) {
    #route-steps::-webkit-scrollbar {
        height: 8px ;
        display: block ;
    }

        background-color: #888 ;
        border-radius: 4px;
    }

    #route-steps::-webkit-scrollbar-track {
        background: #f1f1f1 ;
    }
   
    /* 1. Make the container wider (75% of screen width) */

        width: fit-content ;
        max-width: 75vw ;
        left: 50% ;
        transform: translateX(-50%) ;
        
        /* Ensure it sits slightly higher to accommodate the scrollbar */
        bottom: 25px ; 
    }

    /* 2. Style the scrollbar for the dynamic wrapper */
    .route-scroll-wrapper {
        width: auto;
        padding-bottom: 10px;
    }

    .route-scroll-wrapper::-webkit-scrollbar {
        height: 10px ; /* Slightly thicker for desktop */
        display: block ;
    }

    .route-scroll-wrapper::-webkit-scrollbar-thumb {
        background-color: #888 ;
        border-radius: 6px ;
        border: 2px solid #ffffff; 
    }

    .route-scroll-wrapper::-webkit-scrollbar-track {
        background: #f1f1f1 ;
        border-radius: 6px ;
    }

    #landmark-detail-card {
        /* Adjust this value based on your exact layout needs */
        bottom: 140px ; 
    }

/**
 * Calculates if a point is within a certain distance of a line segment.
 * @param {Object} pt - The landmark {lat, lng}
 * @param {Object} p1 - Start of segment (Venue A) {lat, lng}
 * @param {Object} p2 - End of segment (Venue B) {lat, lng}
 * @param {Number} tolerance - Distance in degrees (approx 0.001 is ~111 meters)
 */
function isPointNearSegment(pt, p1, p2, tolerance) {
    const x = pt.lat, y = pt.lng;
    const x1 = p1.lat, y1 = p1.lng;
    const x2 = p2.lat, y2 = p2.lng;

    const dx = x2 - x1;
    const dy = y2 - y1;

    // If the two venues are basically on top of each other
    if (dx === 0 && dy === 0) {
        const dist = Math.sqrt((x - x1) ** 2 + (y - y1) ** 2);
        return dist <= tolerance;
    }

    // Calculate the projection of the point onto the line
    const t = ((x - x1) * dx + (y - y1) * dy) / (dx * dx + dy * dy);

    if (t < 0) {
        // Point is closest to the start point (p1)
        return Math.sqrt((x - x1) ** 2 + (y - y1) ** 2) <= tolerance;
    } else if (t > 1) {
        // Point is closest to the end point (p2)
        return Math.sqrt((x - x2) ** 2 + (y - y2) ** 2) <= tolerance;
    } else {
        // Point is closest to the segment itself
        const projX = x1 + t * dx;
        const projY = y1 + t * dy;
        return Math.sqrt((x - projX) ** 2 + (y - projY) ** 2) <= tolerance;
    }
}


function updateRoutePreview() {
    const infoBox = document.getElementById('route-info-box');
    const infoText = document.getElementById('route-info-text');
    const count = selectedVenues.size;

    if (count > 0 && appState === 'selection') {
        if (!isInfoBoxManuallyHidden) {
            infoBox.classList.remove('hidden');
        }
        
        
        const selectedObjects = Array.from(selectedVenues)
            .map(id => venues.find(v => v.id === id))
            .sort((a, b) => b.lat - a.lat); // Sort to match your route logic

        // 1. Better Landmark Counting
        const nearbyLandmarks = venues.filter(v => {
            if (v.type !== 'landmark') return false;
            
            // If only 1 venue selected, check radius
            if (selectedObjects.length === 1) {
                const dist = google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(v.lat, v.lng),
                    new google.maps.LatLng(selectedObjects[0].lat, selectedObjects[0].lng)
                );
                return dist <= 150;
            }

            // If 2+ venues, check if it's near any segment of the route
            return selectedObjects.some((venue, idx) => {
                if (idx === 0) return false;
                const prevVenue = selectedObjects[idx - 1];
                // 0.0009 is roughly 100 meters in Istanbul's latitude
                return isPointNearSegment(v, prevVenue, venue, 0.0009);
            });
        });


        // 2. Walking Time Estimate (Unchanged)
        let totalDist = 0;
        if (selectedObjects.length > 1) {
            for (let i = 0; i < selectedObjects.length - 1; i++) {
                totalDist += google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(selectedObjects[i].lat, selectedObjects[i].lng),
                    new google.maps.LatLng(selectedObjects[i+1].lat, selectedObjects[i+1].lng)
                );
            }

        }
        const walkTime = Math.max(Math.round(totalDist / 80), count * 2);

infoText.innerHTML = `

function addMarker(venue) {
    const marker = new google.maps.Marker({
        position: { lat: venue.lat, lng: venue.lng },
        map: null,
        title: venue.name
    });

    marker.addListener('click', () => {
        // --- ADD THIS LINE ---
        lastClickedRouteItem = venue; 

        if (appState === 'selection') {
            toggleVenueSelection(venue.id);
        } else {
            // If we are in map mode, show the card when the pin is clicked
            showVenueCard(venue);
        }
    });
    
    markers[venue.id] = marker;
    updateMarkerIcon(venue.id, false);
}

    function updateMarkerIcon(venueId, isSelected, stepNumber = null) {
        const marker = markers[venueId];
        if (!marker) return;

        if (stepNumber !== null) {
            // ROUTE MODE: Numbered circles
            marker.setIcon({
                path: google.maps.SymbolPath.CIRCLE,
                scale: 14,
                fillColor: "#047666",
                fillOpacity: 1,
                strokeWeight: 2,
                strokeColor: "#FFFFFF"
            });
            marker.setLabel({
                text: stepNumber.toString(),
                color: "#FFFFFF",
                fontSize: "12px",
                fontWeight: "bold"
            });
            marker.setMap(map); // Ensure it is visible on map
        } else {
            // SELECTION MODE: Standard pins
            const color = isSelected ? "047666" : "12a48e";
            marker.setIcon({
                url: `https://chart.apis.google.com/chart?chst=d_map_pin_letter&chld=|${color}|FFFFFF`,
                scaledSize: new google.maps.Size(30, 30)
            });
            marker.setLabel(null);
            marker.setMap(null); // Hide in selection view until calculation
        }
    }
function getDistanceFromPath(point, path) {
    let minDistance = Infinity;
    path.forEach(pathPoint => {
        const dist = google.maps.geometry.spherical.computeDistanceBetween(point, pathPoint);
        if (dist < minDistance) minDistance = dist;
    });
    return minDistance;
}

async function calculateRoute() {
    if (selectedVenues.size < 2) return alertUser("En az iki mekan seçin.", 'error');
    
    const btnText = document.getElementById('btn-text');
    mainActionButton.disabled = true;
    btnText.textContent = "Hesaplanıyor...";

    // 1. Get the selected venues
    let stops = Array.from(selectedVenues).map(id => venues.find(v => v.id === id));
    
    // 2. Sort by Latitude (North to South) to prevent zig-zagging
    // This ensures stops follow the natural flow of Istiklal Avenue
    stops.sort((a, b) => b.lat - a.lat); 

    // 3. Define the request using 'stops' instead of 'ordered'
    const request = {
        origin: { lat: stops[0].lat, lng: stops[0].lng },
        destination: { lat: stops[stops.length-1].lat, lng: stops[stops.length-1].lng },
        waypoints: stops.slice(1, -1).map(s => ({ location: { lat: s.lat, lng: s.lng }, stopover: true })),
        optimizeWaypoints: true, 
        travelMode: 'WALKING'
    };

    directionsService.route(request, (response, status) => {
        mainActionButton.disabled = false;
        if (status === 'OK') {
            Object.values(markers).forEach(m => m.setMap(null));
            directionsRenderer.setDirections(response);
            
            const path = response.routes[0].overview_path;
            
            const directLandmarks = venues.filter(v => {
                if (v.type !== 'landmark') return false;
                const dist = getDistanceFromPath(new google.maps.LatLng(v.lat, v.lng), path);
                return dist <= 50;
            });

            const peripheralLandmarks = venues.filter(v => {
                if (v.type !== 'landmark') return false;
                const dist = getDistanceFromPath(new google.maps.LatLng(v.lat, v.lng), path);
                return dist > 50 && dist <= 150;
            });

            switchView('map');
            
            // Pass 'stops' here as well to replace 'orderedMuseums'
            route_summary_horizontal(response, stops, directLandmarks);
            
            showPeripheralLandmarks(peripheralLandmarks);
        } else {
            alertUser('Rota bulunamadı: ' + status, 'error');
        }
    });
}

function panToVenueWithOffset(lat, lng) {
    const latLng = new google.maps.LatLng(lat, lng);
    map.panTo(latLng);
    
    // We calculate the offset: 
    // To get the venue in the top 2/3, we need to push the map 'down' 
    // by roughly 1/6th of its total height.
    const offsetPixels = (map.getDiv().offsetHeight / 4);
    
    // panBy moves the map by pixels (x, y)
    map.panBy(0, offsetPixels);
}

function handleRouteItemClick(venueId) {

    if (!venueData) return;

    if (document.getElementById('landmark-detail-card')) {
        showVenueCard(venueData);
    }
}

function getPointProgressOnPath(point, path) {
    let minDistance = Infinity;
    let progressIndex = 0;
    
    for (let i = 0; i < path.length; i++) {
        const dist = google.maps.geometry.spherical.computeDistanceBetween(point, path[i]);
        if (dist < minDistance) {
            minDistance = dist;
            progressIndex = i;
        }
    }
    return progressIndex;
}


function route_summary_horizontal(response, orderedMuseums, directLandmarks) {
    const existing = document.getElementById('horizontal-route-container');
    if (existing) existing.remove();

    const path = response.routes[0].overview_path;

    // --- STEP 1: START FRESH (MOVE THIS TO THE TOP) ---
    // This clears the map before we start drawing any new markers
    Object.values(markers).forEach(m => m.setMap(null));

    // --- STEP 2: DRAW PERIPHERAL LANDMARKS ---
    const peripheralLandmarks = venues.filter(v => {
        if (v.type !== 'landmark') return false;
        const dist = getDistanceFromPath(new google.maps.LatLng(v.lat, v.lng), path);
        return dist > 50 && dist <= 150; 
    });

    peripheralLandmarks.forEach(landmark => {
        const marker = markers[landmark.id];
        if (marker) {
            marker.setIcon({
                path: google.maps.SymbolPath.CIRCLE,
                scale: 7,
                fillColor: "#ffde59",
                fillOpacity: 0.7,
                strokeWeight: 1,
                strokeColor: "#ffffff"
            });
            marker.setLabel(null);
            marker.setMap(map); // Now it stays visible
            
            google.maps.event.clearInstanceListeners(marker);
            marker.addListener('click', () => {
                lastClickedRouteItem = landmark;
                showVenueCard(landmark);
            });
        }
    });

    // --- STEP 3: DRAW MAIN ROUTE MARKERS ---
    let fullRoute = [...orderedMuseums, ...directLandmarks];
    fullRoute.sort((a, b) => {
        const posA = getPointProgressOnPath(new google.maps.LatLng(a.lat, a.lng), path);
        const posB = getPointProgressOnPath(new google.maps.LatLng(b.lat, b.lng), path);
        return posA - posB;
    });

    const firstLandmark = fullRoute.find(stop => stop.type === 'landmark');

    if (firstLandmark) {
        // If a landmark exists on the route, set it as the default memory
        lastClickedRouteItem = firstLandmark;
    } else if (fullRoute.length > 0) {
        // Fallback: If no landmarks are on the path, use the first museum (#1)
        lastClickedRouteItem = fullRoute[0];
    }

    fullRoute.forEach((stop, i) => {
        const isLandmark = stop.type === 'landmark';
        const markerColor = isLandmark ? "#ffde59" : "#047666";
        const marker = markers[stop.id];
        if (marker) {
            marker.setIcon({
                path: google.maps.SymbolPath.CIRCLE,
                scale: 14,
                fillColor: markerColor,
                fillOpacity: 1,
                strokeWeight: 2,
                strokeColor: "#FFFFFF"
            });
            marker.setLabel({
                text: (i + 1).toString(),
                color: isLandmark ? "#92400e" : "#FFFFFF",
                fontSize: "12px",
                fontWeight: "bold"
            });
            marker.setMap(map);

            google.maps.event.clearInstanceListeners(marker);
            marker.addListener('click', () => {
                lastClickedRouteItem = stop;
                panToVenueWithOffset(stop.lat, stop.lng);
                showVenueCard(stop);
            });
        }
    });

    const card = document.createElement('div');
    card.id = 'horizontal-route-container';
    card.className = 'route-horizontal-card animate-bounce-in';
    card.style.position = 'fixed';
    card.style.paddingTop = '12px'


    // Build the container structure
    card.innerHTML = `
        <div class="route-card-controls">

           <button onclick="switchView('selection')" class="route-control-btn">
                Rotayı Değiştir
            </button>

            <button onclick="generateShareableLink()" 
            class="btn-static !p-0 !min-w-[35px] !w-[35px] !h-[35px] flex items-center justify-center rounded-full overflow-hidden">
            <img src="https://www.freyartt.com/wp-content/uploads/2026/04/share_icon_4.png" alt="Share" 
         class="w-5 h-5 object-contain">
  
            </button>
            
 
            
<button id="toggle-landmark-btn" 
        onclick="toggleLandmarkDisplay()" 
        class="btn-static !p-0 !min-w-[35px] !w-[35px] !h-[35px] flex items-center justify-center rounded-full overflow-hidden">
    <img src="https://www.freyartt.com/wp-content/uploads/2026/04/info_icon_3.png" 
         alt="Info" 
         class="w-5 h-5 object-contain">
</button>
            
        </div>
        <div class="route-scroll-wrapper" id="horizontal-steps-list"></div>
    `;
    document.body.appendChild(card);

    // 2. Add the steps individually to attach clean click events
    const stepsList = document.getElementById('horizontal-steps-list');
    fullRoute.forEach((stop, i) => {
        const isLandmark = stop.type === 'landmark';
        const color = isLandmark ? "#ffde59" : "#047666";
        const textColor = isLandmark ? "#92400e" : "#FFFFFF";

        const node = document.createElement('div');
        node.className = 'route-step-node cursor-pointer';
        
        // This handles the memory save and the pan
        node.addEventListener('click', () => handleRouteItemClick(stop.id));

        node.innerHTML = `
            <p class="text-[9px] font-bold text-gray-800 leading-tight line-clamp-2 h-[22px] mb-1">
                ${stop.name}
            </p>
            <div class="step-number-circle" style="background-color: ${color}; color: ${textColor}">
                ${i + 1}
            </div>
        `;
        stepsList.appendChild(node);
    });
}

async function generateShareableLink() {
    // 1. Prepare data
    const routeIds = Array.from(selectedVenues).join(',');
    const baseUrl = window.location.origin + window.location.pathname;
    const shareUrl = `${baseUrl}?route=${routeIds}`;
    
    // Combine text and URL for the clipboard fallback
    const fullMessage = `🎨 Beyoğlu Sanat Rotam!\n` +
                        `${currentRouteStats.venueCount} Mekan, ` +
                        `${currentRouteStats.landmarkCount} Gezi noktası, ` +
                        `${currentRouteStats.walkTime} dk yürüme mesafesi.\n` +
                        `Rotamı detaylı incelemek için: ${shareUrl}`;

    // 2. Mobile: Native Share API
    if (navigator.share) {
        try {
            await navigator.share({
                title: 'Beyoğlu Sanat Rotam!',
                text: `🎨 ${currentRouteStats.venueCount} Mekan, ${currentRouteStats.landmarkCount} Gezi noktası, ${currentRouteStats.walkTime} dk yürüme mesafesi.`,
                url: shareUrl
            });
        } catch (err) {
            console.log('Paylaşım iptal edildi');
        }
    } 
    // 3. Desktop/Fallback: Copy to Clipboard
    else {
        try {
            await navigator.clipboard.writeText(fullMessage);
            alert("Rota bilgileri kopyalandı! Şimdi istediğin yere yapıştırabilirsin.");
        } catch (err) {
            console.error("Kopyalama başarısız: ", err);
        }
    }
}
